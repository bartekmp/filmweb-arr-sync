services:
  filmweb-arr-sync:
    image: ghcr.io/bartekmp/filmweb-arr-sync:latest
    restart: unless-stopped
    ports:
      - "8080:8080"  # Expose health check endpoint
    volumes:
      - filmweb_sync_data:/data
      # Uncomment to use a config file instead of environment variables:
      # - ./config.yaml:/app/config.yaml:ro
    environment:
      FILMWEB_USERNAME: your_filmweb_username

      RADARR_URL: http://radarr:7878
      RADARR_API_KEY: your_radarr_api_key
      RADARR_ROOT_FOLDER: /movies
      RADARR_QUALITY_PROFILE_ID: 1
      # RADARR_ENABLED: "false"  # Set to false to disable Radarr sync
      # RADARR_TAG: filmweb       # Tag applied to added movies; set to "" to disable

      SONARR_URL: http://sonarr:8989
      SONARR_API_KEY: your_sonarr_api_key
      SONARR_ROOT_FOLDER: /tv
      SONARR_QUALITY_PROFILE_ID: 1
      # SONARR_LANGUAGE_PROFILE_ID: 1  # Sonarr v3 only
      # SONARR_ENABLED: "false"  # Set to false to disable Sonarr sync
      # SONARR_TAG: filmweb       # Tag applied to added shows; set to "" to disable

      SYNC_INTERVAL_MINUTES: 30  # ignored when SYNC_CRON is set
      # SYNC_CRON: "0 4 * * *"  # optional: run at a fixed time instead of every N minutes
      ADD_DELAY_SECONDS: 5
      # STATE_FILE: /data/state.json  # Override default state file location
      # SYNC_DRY_RUN: "true"  # Uncomment to preview without making changes

      # Batch queue — spreads additions over time to avoid overwhelming Radarr/Sonarr
      # BATCH_QUEUE_ENABLED: "true"
      # BATCH_SIZE: 5
      # BATCH_INTERVAL_MINUTES: 10

      # Telegram bot — send Filmweb/IMDb links to add titles on demand (daemon mode only)
      # TELEGRAM_BOT_ENABLED: "true"
      # TELEGRAM_BOT_TOKEN: "123456:ABC-your-bot-token-from-botfather"
      # TELEGRAM_ALLOWED_USER_IDS: "11111111,22222222"  # numeric user IDs; empty = everyone
      # TELEGRAM_SEARCH_ON_ADD: "true"

volumes:
  filmweb_sync_data:
